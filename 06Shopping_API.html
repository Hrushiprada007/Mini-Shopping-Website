<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../bootstrap-icons/font/bootstrap-icons.css">
    <style>
        body{
            border-radius: 12px;
        }
    </style>
    <script>
        function GetCategories(){
            //this first fetch method fetch from categories
            fetch("https://fakestoreapi.com/products/categories")
            .then(function(response){
                return response.json();
            })
            .then(function(data){
                //Add API categories
                for(var item of data){
                    var option = document.createElement("option");
                    option.text=item.toUpperCase();
                    option.value = item;
                    document.getElementById("1stCategories").appendChild(option);
                }
            })

        }
        function GetProducts(url){
            document.getElementById("productsContainer").innerHTML="";
            fetch(url)
            .then(function(response){
                return response.json();
            })
            .then(function(data){
                for(var item of data){
                    var div = document.createElement("div");
                    div.className="card m-2 p-2";
                    div.style.width="180px";
                    div.style.border="3px solid black";
                    div.style.backgroundColor="pink";
                    div.innerHTML=`
                     <img src=${item.image} class="card-img-top" height="200">
                     <div class="card-header" style="height:120px">
                        <p>${item.title}</p>
                       
                        
                     </div>
                     <div class="card-body">
                        <p>${item.price}</p>
                        <p>Rating :${item.rating.rate}</P>
                        <p>Count:${item.rating.count}</p>
                    </div>   
                    <div class="card-footer">
                        <button onclick="AddToCartClick(${item.id})" class="btn btn-danger">
                            <span class="bi bi-danger"></span>
                            Add to cart
                        </button>
                    </div>
                    `;
                    document.getElementById("productsContainer").appendChild(div);

                }
            })

        }

            GetCategories(); //fetch 1st fetch method

        function categoryChanged(){
            var categoryName =document.getElementById("1stCategories").value;
            // console.log(categoryName);
            if(categoryName =="ALL"){
                GetProducts("https://fakestoreapi.com/products")
            }
            else{
                GetProducts(`https://fakestoreapi.com/products/category/${categoryName}`);
            }

        }
        var cartItems = [];
        var count = 0;
        function GetCartItemsCount(){
            count = cartItems.length;
            document.getElementById("cartCount").innerHTML = count;

        }

function AddToCartClick(id){
    fetch(`https://fakestoreapi.com/products/${id}`)
    .then(function(response){
        return response.json();
    })
    .then(function(data){
        cartItems.push(data);
        alert("Item added to your Cart");
        GetCartItemsCount();
    });
}
        function showCartClick(){
            var tbody = document.querySelector("tbody");
            tbody.innerHTML = ""; //clear old data
            for(var item of cartItems){
                var tr = document.createElement("tr");

                var tdTitle = document.createElement("td");
                var tdPrice = document.createElement("td");
                var tdPhoto = document.createElement("td");

                tdTitle.innerHTML = item.title;
                tdPrice.innerHTML ="₹ " +item.price;

                var img = document.createElement("img");
                img.src = item.image; //fixed
                img.height = "100";
                img.width= "100";

                tdPhoto.appendChild(img);

                tr.appendChild(tdTitle);
                tr.appendChild(tdPrice);
                tr.appendChild(tdPhoto);

                document.querySelector("tbody").appendChild(tr);
            }
        }

<body class="container-fluid" onload="bodyLoad()">
    <header class="bg-danger text-white text-center p-2 mt-1">
        <h1><span class="bi bi-cart4">Shopping Online</span></h1>
    </header>
    <div class="row">
        <div class="col-2">
            <h4>Select a Category</h4>
            <select name="" id="1stCategories" class="form-select" onchange="categoryChanged()">

            </select>
        </div>
        <div class="col-8">
            <div id="productsContainer" class="d-flex flex-wrap overflow-auto" style="height: 500px;"></div>

        </div>
        <div class="col-2">
            <button onclick="showCartClick()" class="btn btn-warning" data-bs-target="#cart" data-bs-toggle="modal">
                [<span id="cartCount"></span>]
                <span class="bi bi-cart-plus"></span>
                Your Cart items
            </button>
            <div class="modal fade" id="cart">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h3>Your Cart Items</h3>
                            <button class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Title</th>
                                        <th>Price</th>
                                        <th>Preview</th>
                                    </tr>
                                </thead>
                                <tbody>

                                </tbody>

                            </table>
                        </div>
                        <div class="modal-footer">
                            <button  data-bs-dismiss="modal"  class="btn btn-success">Close</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <footer class="bg-danger text-white text-center p-4 mt-3">
    <p class="mb-0">
        © 2026 HIT Solution. All rights reserved.
    </p>
</footer>

<script src="../jquery/dist/jquery.js"></script>
